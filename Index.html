 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firehouse Rotation - Goessel/Newton</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        h1 { color: #d32f2f; }
        .assignment { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #d32f2f; color: white; padding: 12px 20px; border: none; border-radius: 6px; font-size: 16px; margin: 10px 5px; }
        button:hover { background: #b71c1c; }
        .history { margin-top: 30px; }
        .crew { font-size: 14px; color: #555; }
    </style>
</head>
<body>
    <h1>Firehouse Truck Rotation</h1>
    <p><strong>Crew:</strong> Kevin Finley, Joshua Strotkamp, Trevor Yoder, Duaine Helms, Daniel Dennett, Dalton Beckett, Capt. Wald (no truck)</p>
    
    <div id="current" class="assignment">
        <h2>Current Shift Assignments</h2>
        <div id="assignments"></div>
    </div>

    <button onclick="generateNextShift()">Generate Next Shift</button>
    <button onclick="resetAll()">Reset Everything</button>

    <div class="history">
        <h2>Past Shifts</h2>
        <div id="history"></div>
    </div>

    <script>
        const trucks = ["Medic 2", "Engine 2", "AP1", "Squad2/Tender2"];
        const crew = ["Kevin Finley", "Joshua Strotkamp", "Trevor Yoder", "Duaine Helms", "Daniel Dennett", "Dalton Beckett"];
        // Captain Wald is in roster but skips assignments

        let currentAssignments = {};
        let history = [];

        function loadData() {
            const saved = localStorage.getItem('firehouseRotation');
            if (saved) {
                const data = JSON.parse(saved);
                currentAssignments = data.current || {};
                history = data.history || [];
            }
            render();
        }

        function saveData() {
            localStorage.setItem('firehouseRotation', JSON.stringify({
                current: currentAssignments,
                history: history
            }));
        }

        function render() {
            const assignDiv = document.getElementById('assignments');
            assignDiv.innerHTML = '';
            
            if (Object.keys(currentAssignments).length === 0) {
                assignDiv.innerHTML = '<p>No assignments yet. Hit "Generate Next Shift" to start.</p>';
            } else {
                trucks.forEach(truck => {
                    const guy = currentAssignments[truck] || 'Open';
                    const p = document.createElement('p');
                    p.innerHTML = `<strong>${truck}:</strong> ${guy}`;
                    assignDiv.appendChild(p);
                });
                // Gib overflow
                const gibGuy = currentAssignments['Gib'] || 'None';
                const gibP = document.createElement('p');
                gibP.innerHTML = `<strong>Gib (Guy in Back):</strong> ${gibGuy}`;
                assignDiv.appendChild(gibP);
            }

            // History
            const histDiv = document.getElementById('history');
            histDiv.innerHTML = '';
            history.slice().reverse().forEach((entry, i) => {
                const div = document.createElement('div');
                div.className = 'assignment';
                div.innerHTML = `<strong>Shift ${history.length - i}:</strong><br>` +
                    trucks.map(t => `${t}: ${entry[t] || '—'}`).join('<br>') +
                    `<br>Gib: ${entry['Gib'] || '—'}`;
                histDiv.appendChild(div);
            });
        }

        function generateNextShift() {
            // Simple fair rotation: cycle the crew through the positions
            // Keep last assignments and shift everyone "forward"
            let lastPositions = Object.values(currentAssignments);
            let available = crew.filter(guy => !lastPositions.includes(guy)); // rough fairness

            // Better cycling: rotate the order
            if (Object.keys(currentAssignments).length === 0) {
                // First run - assign in order
                currentAssignments = {};
                trucks.forEach((truck, i) => {
                    currentAssignments[truck] = crew[i % crew.length];
                });
                currentAssignments['Gib'] = crew[4] || 'None'; // extra guy to Gib
            } else {
                // Rotate: each person moves to the next truck, last goes to Gib, Gib moves in
                let newAssign = {};
                let prevGuys = [...trucks.map(t => currentAssignments[t]), currentAssignments['Gib'] || null].filter(Boolean);
                
                // Shift the list left (rotate)
                let rotated = prevGuys.slice(1).concat(prevGuys[0]);
                
                trucks.forEach((truck, i) => {
                    newAssign[truck] = rotated[i] || 'Open';
                });
                newAssign['Gib'] = rotated[4] || 'None';
                
                // Add to history before updating
                history.push({...currentAssignments});
                if (history.length > 20) history.shift(); // keep last 20 only
                
                currentAssignments = newAssign;
            }

            saveData();
            render();
        }

        function resetAll() {
            if (confirm("Wipe everything and start fresh?")) {
                localStorage.removeItem('firehouseRotation');
                currentAssignments = {};
                history = [];
                render();
            }
        }

        // Load on start
        window.onload = loadData;
    </script>
</body>
</html>
