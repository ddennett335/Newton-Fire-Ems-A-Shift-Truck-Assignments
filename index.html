<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firehouse Truck Rotation - Goessel/Newton</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        h1 { color: #d32f2f; }
        .assignment { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #d32f2f; color: white; padding: 12px 20px; border: none; border-radius: 6px; font-size: 16px; margin: 10px 5px; }
        button:hover { background: #b71c1c; }
        .crew-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin: 15px 0; }
        .crew-item { background: white; padding: 10px; border-radius: 6px; display: flex; align-items: center; }
        .crew-item input { margin-right: 10px; }
        .history { margin-top: 30px; }
        .date { font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <h1>Firehouse Truck Rotation - v5 debug</h1>
    <p><strong>Crew:</strong> Kevin Finley, Joshua Strotkamp, Trevor Yoder, Duaine Helms, Daniel Dennett, Dalton Beckett, Jordan Boston, Capt. Wald (no truck)</p>

    <div class="assignment">
        <h2>Who's Here Today?</h2>
        <div id="crew-list" class="crew-list"></div>
    </div>

    <div id="current" class="assignment">
        <h2 id="current-date" class="date"></h2>
        <div id="assignments"></div>
    </div>

    <button onclick="generateNextShift()">Generate Next Shift</button>
    <button onclick="resetAll()">Reset Everything</button>

    <div class="history">
        <h2>Past Shifts</h2>
        <div id="history"></div>
    </div>

    <script>
        const trucks = ["Medic 2", "Engine 2", "AP1", "Squad2/Tender2"];
        const fullCrew = ["Kevin Finley", "Joshua Strotkamp", "Trevor Yoder", "Duaine Helms", "Daniel Dennett", "Dalton Beckett", "Jordan Boston"];
        
        let currentAssignments = {};
        let history = [];
        let availability = {};

        function loadData() {
            const saved = localStorage.getItem('firehouseRotation');
            if (saved) {
                const data = JSON.parse(saved);
                currentAssignments = data.current || {};
                history = data.history || [];
                availability = data.availability || {};
            }
            fullCrew.forEach(guy => {
                if (availability[guy] === undefined) availability[guy] = true;
            });
            renderCrewList();
            render();
        }

        function saveData() {
            localStorage.setItem('firehouseRotation', JSON.stringify({
                current: currentAssignments,
                history: history,
                availability: availability
            }));
        }

        function renderCrewList() {
            const div = document.getElementById('crew-list');
            div.innerHTML = '';
            fullCrew.forEach(guy => {
                const checked = availability[guy] ? 'checked' : '';
                const item = document.createElement('div');
                item.className = 'crew-item';
                item.innerHTML = `
                    <input type="checkbox" ${checked} onchange="toggleAvailability('${guy}', this.checked)">
                    <span>${guy}</span>
                `;
                div.appendChild(item);
            });
        }

        function toggleAvailability(guy, isHere) {
            availability[guy] = isHere;
            saveData();
        }

        function getToday() {
            const now = new Date();
            return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
        }

        function render() {
            const dateEl = document.getElementById('current-date');
            dateEl.textContent = currentAssignments.date ? 'Date: ' + currentAssignments.date : 'No shift yet';

            const assignDiv = document.getElementById('assignments');
            assignDiv.innerHTML = '';
            
            if (!currentAssignments.date) {
                assignDiv.innerHTML = '<p>No assignments yet. Set who\'s here and hit "Generate Next Shift".</p>';
                return;
            }

            trucks.forEach(truck => {
                let guy = currentAssignments[truck] || '—';
                if (truck === "Squad2/Tender2" && currentAssignments.squadDedicated) {
                    guy += ' - Dedicated Chase';
                }
                const p = document.createElement('p');
                p.innerHTML = `<strong>${truck}:</strong> ${guy}`;
                assignDiv.appendChild(p);
            });

            const gibGuy = currentAssignments['Gib'] || 'None';
            const gibP = document.createElement('p');
            gibP.innerHTML = `<strong>Gib (Guy in Back):</strong> ${gibGuy}`;
            assignDiv.appendChild(gibP);

            // History render (now forced to show even if empty)
            const histDiv = document.getElementById('history');
            histDiv.innerHTML = history.length ? '' : '<p>No past shifts yet.</p>';
            history.slice().reverse().forEach((entry, i) => {
                const div = document.createElement('div');
                div.className = 'assignment';
                let html = `<strong>Shift ${history.length - i} - ${entry.date || '—'}</strong><br>`;
                trucks.forEach(t => {
                    html += `${t}: ${entry[t] || '—'}<br>`;
                });
                html += `Gib: ${entry['Gib'] || 'None'}`;
                div.innerHTML = html;
                histDiv.appendChild(div);
            });
        }

        function generateNextShift() {
            const hereToday = fullCrew.filter(guy => availability[guy]);
            if (hereToday.length === 0) {
                alert("Nobody marked as here. Check at least some boxes.");
                return;
            }

            let newAssign = { date: getToday() };

            // Rotation order
            let prevOrder = [];
            if (currentAssignments.date) {
                trucks.forEach(t => {
                    if (currentAssignments[t] && currentAssignments[t] !== '—') prevOrder.push(currentAssignments[t]);
                });
                if (currentAssignments['Gib'] && currentAssignments['Gib'] !== 'None') prevOrder.push(currentAssignments['Gib']);
            }

            let stillHere = prevOrder.filter(guy => hereToday.includes(guy));
            let newGuys = hereToday.filter(guy => !stillHere.includes(guy));
            let workingOrder = stillHere.concat(newGuys);

            let rotated = workingOrder.length > 0 ? workingOrder.slice(1).concat(workingOrder[0]) : [];

            // Assign trucks
            let idx = 0;
            trucks.forEach(truck => {
                newAssign[truck] = rotated[idx] || '—';
                idx++;
            });

            // === EXPLICIT SHORT STAFFING FIX (exactly 4 guys) ===
            if (hereToday.length === 4) {
                newAssign["AP1"] = newAssign["Engine 2"];   // same guy on both
                newAssign["Squad2/Tender2"] = '—';          // force Squad blank
                newAssign['Gib'] = 'None';
                newAssign.squadDedicated = false;
            } 
            // 5+ guys
            else if (hereToday.length >= 5) {
                newAssign['Gib'] = rotated[4] || 'None';
                newAssign.squadDedicated = (hereToday.length >= 6);
            } 
            // fewer than 4 (extra safe)
            else {
                newAssign['Gib'] = 'None';
                newAssign.squadDedicated = false;
            }

            // ALWAYS save previous shift to history (even same day)
            if (currentAssignments.date) {
                history.push({...currentAssignments});
                if (history.length > 50) history.shift();
            }

            currentAssignments = newAssign;
            saveData();
            render();
        }

        function resetAll() {
            if (confirm("Wipe everything and start fresh?")) {
                localStorage.removeItem('firehouseRotation');
                currentAssignments = {};
                history = [];
                availability = {};
                loadData();
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
